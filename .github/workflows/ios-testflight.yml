name: ios-testflight

run-name: iOS CI

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-26
    timeout-minutes: 45

    env:
      PROJECT_PATH: app/IoTeam.xcodeproj
      SCHEME: IoTeam
      BUNDLE_ID: com.ayungavis.IoTeamApp
      TEAM_ID: QHL64K2LPL
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "~26.4.0"

      - name: Import code signing certificates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Validate App Store Connect credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          [ -n "$APPSTORE_ISSUER_ID" ] || { echo "Missing GitHub variable APPSTORE_ISSUER_ID"; exit 1; }
          [ -n "$APPSTORE_API_KEY_ID" ] || { echo "Missing GitHub variable APPSTORE_API_KEY_ID"; exit 1; }
          [ -n "$APPSTORE_API_PRIVATE_KEY" ] || { echo "Missing GitHub secret APPSTORE_API_PRIVATE_KEY"; exit 1; }

      - name: Download provisioning profiles
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          profile-type: IOS_APP_STORE
          bundle-id: ${{ env.BUNDLE_ID }}
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Build for simulator
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: >
          xcodebuild
          -project "$PROJECT_PATH"
          -scheme "$SCHEME"
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath .build/DerivedData
          -resultBundlePath .build/IoTeamBuild.xcresult
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
          CURRENT_PROJECT_VERSION="$BUILD_NUMBER"
          build

      - name: Create export options plist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .build
          cat > .build/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          perl -0pi -e 's/\$\{TEAM_ID\}/$ENV{TEAM_ID}/g' .build/ExportOptions.plist

      - name: Archive app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          xcodebuild
          -project "$PROJECT_PATH"
          -scheme "$SCHEME"
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath .build/Archives/IoTeam.xcarchive
          -derivedDataPath .build/DerivedData
          -resultBundlePath .build/IoTeamArchive.xcresult
          -skipPackagePluginValidation
          CURRENT_PROJECT_VERSION="$BUILD_NUMBER"
          archive

      - name: Export IPA
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          xcodebuild
          -exportArchive
          -archivePath .build/Archives/IoTeam.xcarchive
          -exportPath .build/export
          -exportOptionsPlist .build/ExportOptions.plist

      - name: Upload TestFlight build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: .build/export/IoTeam.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload Xcode results
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-results
          if-no-files-found: ignore
          path: .build/**/*.xcresult
